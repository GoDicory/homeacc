<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Привет, Thymeleaf!</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="form-container">
    <h2>Залогиниться:</h2>
    <form th:action="@{/auth/login/}" th:object="${user}" method="post">
        <div class="form-group">
            <label for="login">Логин:</label>
            <input type="text" id="login" th:field="*{login}" placeholder="Введите логин">
        </div>
        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password" id="password" th:field="*{password}" placeholder="Введите пароль">
        </div>
        <button type="submit">Вход</button>
    </form>
</div>
<a href="auth/reg-user/">Зарегестрироваться</a>
</body>
</html>
