<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<!-- Форма для создания пользователя -->
<div class="container p-2 bg-primary text-white text-center">
    <h2>Создать нового пользователя:</h2>
    <form th:action="@{/auth/reg-user/}" th:object="${user}" method="post">
        <div class="form-group">
            <label for="login">Логин:</label>
            <input type="text" id="login" class="form-control" th:field="*{login}" placeholder="Введите логин">
        </div>
        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Введите пароль">
        </div>
        <button type="submit" class="btn bg-success my-3 text-white">Создать пользователя</button>
    </form>
</div>
</body>
</html>
