<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Привет, Thymeleaf!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<div class="header">
    <span>Логотип</span>
    <span>Дата</span>
    <span>Время</span>
</div>

<div class="sidebar">
    <span>дашборд</span>
    <span>категории</span>
    <span>транзакции</span>
    <span>финансовые цели</span>
    <span>отчёт</span>
</div>


<div class="container_main">
    <h1>Добро пожаловать, <span th:text="${username}"></span>!</h1>
    <p>Ваша тестовая логика <span th:text="${serviceTest}"></span> </p>
    <p>Моя база данных <span th:text="${bazaAll}"></span> </p>
</div>

<div class="footer">
    <span>баланс</span>
    <span>кол-во транкзаций</span>
</div>


</body>
</html>
