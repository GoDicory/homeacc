<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--    <link rel="stylesheet" type="text/css" href="/css/style.css">-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="row">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="row">
            <div class="col-sm-3">
                <div class="container-fluid p-2 bg-success text-white text-center">
                    <form th:action="@{/auth/categories/}"  th:object="${newCatSab}" method="post">
                        <div>
                            <label for="category">Категория:</label>
                            <input type="text" id="category" class="form-control" th:field="*{category}" placeholder="Введите название категории">
                        </div>
                        <div>
                            <label for="comment">Коментарий:</label>
                            <textarea  type="text" id="comment" class="form-control" rows="5" th:field="*{comments}" placeholder="Ваш коментарий"></textarea>
                        </div>
                        <div>
                            <button class="btn bg-primary my-3 text-white" type="submit">Добавить</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="col">
                <table class="table table-striped">
                    <tr>
                        <th>Категория</th>
                        <th>Коментарий</th>
                        <th>Удалить</th>
                    </tr>
                    <tr th:each="t : ${catBlockAll}">
                        <td th:text="${t.getCategory}"></td>
                        <td th:text="${t.getComments()}"></td>
                        <td><a th:href="'/auth/categories/delete/' + ${t.id}"
                               onclick="return confirm('Удалить категорию')">Удалить</a>
                        </td>
                    </tr>
                </table>
            </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
