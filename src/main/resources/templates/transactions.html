<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--    <link rel="stylesheet" type="text/css" href="/css/style.css">-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>
</head>
<body>
<div class="container-fluid">
    <div th:replace="~{fragments/header :: header}"></div>
    <main class="row">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <div class="row">
            <div class="col-sm-3">
                <div class="container-fluid p-2 bg-success text-white">
                    <form th:action="@{/auth/transactions/}" th:object="${transactions}" method="post">
                        <div>
                            <div>
                                <label for="data">Дата:</label>
                                <input type="date" id="data" class="form-control"  th:field="*{data}" placeholder="ГГГГ-ММ-ДД">
                            </div>
                            <div>
                                <label for="score">Счёт:</label>
                                <input type="text" id="score" class="form-control" th:field="*{score}" placeholder="Введите название счёта">
                            </div>
                            <div>
                                <label for="category">Категория:</label>
                                <select id="category" class="form-control" th:field="*{categoryId}">
                                    <option th:each="cat : ${categoryList}" th:value="${cat.id}" th:text="${cat.category}" ></option>
                                </select>
                            </div>
                            <div>
                                <label for="subCategory">Подкатегория:</label>
                                <input type="text" id="subCategory" class="form-control" th:field="*{subCategories}" placeholder="Название Подкатегории">
                            </div>
                            <div>
                                <label for="summa">Сумма:</label>
                                <input type="number" id="summa" class="form-control" th:field="*{summa}" placeholder="Сумма">
                            </div>
                            <div>
                                <label for="comment">Коментарий:</label>
                                <textarea id="comment" class="form-control" name="text" rows="2" th:field="*{comments}" placeholder="Коментарий"></textarea>
                            </div>
                            <div class="d-grid">
                                <button class="btn bg-primary my-3 text-white" type="submit">Добавить</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col">
                <table class="table table-striped">
                    <tr>
                        <th>Дата</th>
                        <th>Счёт</th>
                        <th>Категория</th>
                        <th>Подкатегория</th>
                        <th>Сумма</th>
                        <th>Коментарий</th>
                        <th>Удалить</th>
                    </tr>
                    <tr th:each="t : ${tablesTransactions}">
                        <td th:text="${t.data}"></td>
                        <td th:text="${t.score}"></td>
                        <td th:text="${t.categories}"></td>
                        <td th:text="${t.getSubCategories()}"></td>
                        <td th:text="${t.summa}"></td>
                        <td th:text="${t.comments}"></td>
                        <td><a th:href="'/auth/transactions/delete/' + ${t.id}"
                            onclick="return confirm('Удалить транзакцию')">Удалить</a>
                        </td>
                    </tr>
                </table>
            </div>

        </div>
    </main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
